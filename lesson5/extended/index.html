<!DOCTYPE html>
<html lang="pl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Postcard CSS</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <div class="postcard">
    <div class="sky">
      <div class="cloud">
        <div class="cloud-part"></div>
        <div class="cloud-part"></div>
        <div class="cloud-part"></div>
      </div>
      <div class="cloud cloud--right">
        <div class="cloud-part"></div>
        <div class="cloud-part"></div>
        <div class="cloud-part"></div>
      </div>
    </div>
    <div class="sun"></div>
    <div class="hills"></div>
    <div class="water"></div>
    <div class="tree">
      <div class="tree-top"></div>
      <div class="tree-trunk"></div>
    </div>
    <div class="text-overlay">A postcard from the end of the world 🌅</div>
  </div>
</body>
</html>
